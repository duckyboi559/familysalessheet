<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Sales Tracker</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app">

  <h1>Daily Sales Tracker</h1>

  <!-- DATE -->
  <div class="card">
    <label>Select Date:</label>
    <input type="date" id="datePicker"/>
  </div>

  <!-- JESSICA -->
  <div class="card">
    <h2>Jessica</h2>
    <div id="jessicaItems"></div>
    <p>Total: $<span id="jessicaTotal">0</span></p>
  </div>

  <!-- JANIE -->
  <div class="card">
    <h2>Janie</h2>
    <div id="janieItems"></div>
    <p>Total: $<span id="janieTotal">0</span></p>
  </div>

  <!-- PAYMENTS -->
  <div class="card">
    <h2>Payments</h2>
    <button onclick="setPayment('cash')">Cash</button>
    <button onclick="setPayment('digital')">Digital</button>
    <button onclick="setPayment('split')">Split</button>
    <p>Cash: $<span id="cashTotal">0</span></p>
    <p>Digital: $<span id="digitalTotal">0</span></p>
  </div>

  <!-- TIPS -->
  <div class="card">
    <h2>Tips</h2>
    <input type="number" id="tipsInput" placeholder="Enter tips"/>
  </div>

  <!-- TOTAL -->
  <div class="card">
    <h2>Summary</h2>
    <p>Combined: $<span id="combinedTotal">0</span></p>
    <p>Total Tips: $<span id="tipsTotal">0</span></p>
  </div>

  <button class="saveBtn" onclick="saveDay()">Save Day</button>

  <!-- HISTORY -->
  <div class="card">
    <h2>Previous Days</h2>
    <div id="history"></div>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script src="script.js"></script>
</body>
</html>
