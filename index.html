<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Sales Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-bg"></div>

  <main class="app-shell">
    <header class="topbar">
      <div class="brand-box">
        <img src="images/logo.png" alt="Business Logo" class="brand-logo" />
      </div>

      <div class="title-wrap">
        <h1>♡ Daily Sales Tracker ♡</h1>
      </div>
    </header>

    <section class="date-card glass-card">
      <div class="date-label">
        <span class="mini-icon">📅</span>
        <span>Select Date:</span>
      </div>
      <input type="date" id="datePicker" />
    </section>

    <section class="main-grid">
      <div class="glass-card section-card owner-card">
        <div class="section-header">
          <div class="owner-badge">🥞</div>
          <h2>Jessica</h2>
        </div>

        <div class="menu-list" id="jessicaMenuList"></div>

        <div class="owner-total-row">
          <span>Jessica Total</span>
          <strong id="jessicaTotal">$0.00</strong>
        </div>
      </div>

      <div class="glass-card section-card owner-card">
        <div class="section-header">
          <div class="owner-badge">🍋</div>
          <h2>Janie</h2>
        </div>

        <div class="menu-list" id="janieMenuList"></div>

        <div class="owner-total-row">
          <span>Janie Total</span>
          <strong id="janieTotal">$0.00</strong>
        </div>
      </div>
    </section>

    <section class="bottom-grid">
      <div class="glass-card payments-card">
        <div class="section-title-row">
          <span class="section-emoji">💳</span>
          <h3>Payments</h3>
        </div>

        <div class="payment-buttons">
          <button id="payCashBtn" class="pay-btn active" type="button">
            <span class="pay-emoji">💵</span>
            <span>Cash</span>
          </button>

          <button id="payDigitalBtn" class="pay-btn" type="button">
            <span class="pay-emoji">📱</span>
            <span>Digital</span>
          </button>

          <button id="paySplitBtn" class="pay-btn" type="button">
            <span class="pay-emoji">↪</span>
            <span>Split</span>
          </button>
        </div>

        <div class="payment-totals">
          <div class="payment-total cash-box">
            <div class="small-label">Cash Total</div>
            <div id="cashTotal">$0.00</div>
          </div>

          <div class="payment-total digital-box">
            <div class="small-label">Digital Total</div>
            <div id="digitalTotal">$0.00</div>
          </div>
        </div>
      </div>

      <div class="glass-card tips-card">
        <div class="section-title-row">
          <span class="section-emoji">🫙</span>
          <h3>Tips</h3>
        </div>

        <div class="tips-input-wrap">
          <span class="tips-dollar">$</span>
          <input type="number" id="tipsInput" min="0" step="0.01" placeholder="Enter total tips" />
        </div>

        <div class="tips-total-box">
          <div class="small-label">Total Tips</div>
          <div id="tipsTotal">$0.00</div>
        </div>
      </div>
    </section>

    <section class="glass-card summary-card">
      <div class="section-title-row">
        <span class="section-emoji">🧮</span>
        <h3>Summary</h3>
      </div>

      <div class="summary-grid">
        <div class="summary-item">
          <div class="small-label">Jessica Total</div>
          <div id="summaryJessica">$0.00</div>
        </div>
        <div class="summary-item">
          <div class="small-label">Janie Total</div>
          <div id="summaryJanie">$0.00</div>
        </div>
        <div class="summary-item">
          <div class="small-label">Combined Total</div>
          <div id="combinedTotal">$0.00</div>
        </div>
        <div class="summary-item">
          <div class="small-label">Total Tips</div>
          <div id="summaryTips">$0.00</div>
        </div>
      </div>
    </section>

    <button id="saveDayBtn" class="save-day-btn" type="button">
      <span class="save-icon">💾</span>
      <span>Save Day</span>
    </button>

    <section class="glass-card history-card">
      <div class="history-top">
        <div class="section-title-row">
          <span class="section-emoji">📅</span>
          <h3>Previous Days</h3>
        </div>

        <button id="refreshHistoryBtn" class="refresh-btn" type="button">⟳ Refresh</button>
      </div>

      <div class="history-list" id="historyList"></div>
    </section>
  </main>

  <script type="module" src="script.js"></script>
</body>
</html>
